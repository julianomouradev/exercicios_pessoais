<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Brasileirão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Tabela Do Brasileirão</h1>
    </header>
    
    <main>
        <table>
            <caption>
                Tabela Do Brasileirão
            </caption>
            <tr>
                <th id="C">C</th>
                <th id="T">Time</th>
                <th id="P">P</th>
                <th id="J">J</th>
            </tr>
            <tr>
                <td class="position">1</td>
                <td>Palmeiras</td>
                <td>19</td>
                <td>8</td>
            </tr>
            <tr>
                <td class="position">2</td>
                <td>Fluminense</td>
                <td>19</td>
                <td>9</td>
            </tr>
            <tr>
                <td class="position">3</td>
                <td>Bahia</td>
                <td>17</td>
                <td>8</td>
            </tr>
            <tr>
                <td class="position">4</td>
                <td>São Paulo</td>
                <td>9</td>
                <td>5</td>
            </tr>
        </table>
    </main>
</body>
</html>
