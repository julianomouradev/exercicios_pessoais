<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Caixa Dinâmica</title>
    <style>

     * {
        margin: 0px;
        padding: 0px;
     }

     body {
        background-color: chocolate;
     } 

     main {
        width: 50%;
        margin: auto;
        height: 1000px;
        background-color: white;

     }

     main > section > h1 {
        text-align: center;
        padding: 10px;
     }

     p {
        padding: 0px 5px 10px 5px;
     }

     main > section > .caixa {
       display: flex;
       margin: auto;
       margin-top: 10px;
       width: 85px;
       padding: 15px;
       border-radius: 25px;
       text-decoration: none;
       color: white;
       text-shadow: 0px 0px 5px rgba(0, 0, 0, 0.623);
       background-color: goldenrod;
     }

     main > section > .caixa:hover {
        box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.493);
     }

    </style>
</head>
<body>
    <main>
        <section>
            <h1>Caixa Dinâmica</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Accusamus neque, nisi officiis quam itaque, repellat doloremque eius maiores vel nulla ipsa. Reprehenderit vitae dolore dolorem tempora repellat. Earum, perferendis iusto!</p>
            
            <a href="https://chatgpt.com/" target="_blank" class="caixa">Clique Aqui!</a>
        </section>
    </main>
</body>
</html>
