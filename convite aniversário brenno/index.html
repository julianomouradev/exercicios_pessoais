<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite de Aniversário Brenno</title>
  <link rel="shortcut icon" href="favicon-removebg-preview.png" type="image/x-icon">

  <style>
    body {
      margin: 0;
      font-family: 'Verdana', sans-serif;
      background: #0b1d2d; 
      color: #f8f8f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-image: url('jurassic12.png'); 
      background-size: cover;
      background-position: center;
    }

    .convite {
      background: rgba(0,0,0,0.7);
      padding: 24px;
      border-radius: 16px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    h1 {
      margin-bottom: 12px;
      font-size: 28px;
      font-family: 'Impact', sans-serif;
      color: #ffcc00de; 
  
      
    }

    #primeiro {
      padding: 0px 0px 0px 0px;
      width: 0px 0px 0px 0px;
      margin: 0px 0px 0px 0px;
    }

    #segundo {
      padding: 0px 0px 0px 0px;
      width: 0px 0px 0px 0px;
      margin: 0px 0px 0px 0px;
    }

    .info {
      margin: 16px 0;
      font-size: 16px;
      line-height: 1.6;
    }

    .botao {
      display: block;
      margin-top: 24px;
      padding: 14px;
      background: #22c55e;
      color: #020617;
      text-decoration: none;
      font-weight: bold;
      border-radius: 12px;
      font-size: 16px;
    }

    .botao:hover {
      background: #16a34a;
    }

    .rodape {
      margin-top: 16px;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="convite">
    <h1 id="primeiro">🎉 Brenno</h1>
    <h1 id="segundo">8 Anos</h1>

    <div class="info">
      📅 31 de Janeiro<br>
      ⏰ 12h<br>
      📍 Casa Do Jonathan
    </div>

    <a 
      class="botao" 
      href="https://maps.app.goo.gl/aswF1UKMzMdcp7RP7" 
      target="_blank">
      📍 Ver localização
    </a>

    <div class="rodape">
      Prepare-se para uma aventura pré-histórica!
    </div>
  </div>

</body>
</html>
